[program:ollama]
command=/usr/local/bin/ollama serve
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/ollama.log
stderr_logfile=/var/log/supervisor/ollama.log
environment=OLLAMA_HOST="%(ENV_OLLAMA_HOST)s",OLLAMA_KEEP_ALIVE="%(ENV_OLLAMA_KEEP_ALIVE)s",OLLAMA_NUM_PARALLEL="%(ENV_OLLAMA_NUM_PARALLEL)s"
priority=10

[program:chromadb]
command=python3 -m chromadb.cli.cli run --host %(ENV_CHROMA_HOST)s --port %(ENV_CHROMA_PORT)s --path %(ENV_CHROMA_DATA_DIR)s
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/chromadb.log
stderr_logfile=/var/log/supervisor/chromadb.log
priority=20

[program:mcp]
command=python3 /scripts/mcp_server.py
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/mcp.log
stderr_logfile=/var/log/supervisor/mcp.log
priority=30
